version: '3.8'
services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
      - ./static:/app/static
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev # Use the development Dockerfile
    ports:
      - "8081:8081" # Expose Vite dev server directly (optional, since Caddy routes to it)
    volumes:
      - ./frontend:/app # Mount the local code into the container for live-reload
      - /app/node_modules # Anonymous volume to prevent local node_modules from overwriting container's
    depends_on:
      - backend

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env

  caddy:
    image: caddy:2
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - ghost

  ghost:
    image: ghost:5-alpine
    restart: always
    ports:
      - "2368:2368"
    environment:
      # We use SQLite for easy development.
      database__client: sqlite3
      database__connection__filename: content/data/ghost.db
      database__useNullAsDefault: "true"
      database__debug: "false"
      # URL needs to match the host:port that will be accessing the CMS
      url: http://localhost:2368
    volumes:
      - ghost_data:/var/lib/ghost/content

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  ghost_data:
