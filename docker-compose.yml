services:
  backend:
    build:
      context: ./backend
    volumes:
      - static_data:/app/static
    # env_file is removed; Docker Compose will use the root .env file by default
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # These args will be populated by the root .env file
      args:
        - VITE_GHOST_URL=${VITE_GHOST_URL}
        - VITE_GHOST_CONTENT_KEY=${VITE_GHOST_CONTENT_KEY}
        - VITE_MONERO_ADDRESS=${VITE_MONERO_ADDRESS}
        - VITE_YOUTUBE_URL=${VITE_YOUTUBE_URL}
        - VITE_TWITTER_URL=${VITE_TWITTER_URL}
        - VITE_DISCORD_URL=${VITE_DISCORD_URL}
        - VITE_TWITCH_URL=${VITE_TWITCH_URL}
    depends_on:
      - backend

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment: # <--- ADDED THIS SECTION
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-dbname}"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - ghost

  ghost:
    image: ghost:5-alpine
    restart: always
    environment:
      database__client: sqlite3
      database__connection__filename: content/data/ghost.db
      database__useNullAsDefault: "true"
      database__debug: "false"
      url: https://ghost.study-juche.com
    volumes:
      - ghost_data:/var/lib/ghost/content

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  ghost_data:
  static_data:
